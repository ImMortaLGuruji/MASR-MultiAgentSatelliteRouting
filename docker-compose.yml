version: "3.9"

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      MASR_TICK_INTERVAL: "0.5"

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install; npm run dev -- --host"
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000
    depends_on:
      - backend
